name: Deploy Demo Example

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch (or ref) to build and deploy to retro-mage-demo.pixeldrip.games'
        required: true
        default: 'main'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter "./packages/*" build

      - name: Build demo
        run: pnpm --filter demo build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync examples/demo/dist "s3://${{ vars.DEMO_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DEMO_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "Deployed branch '${{ github.event.inputs.branch }}' to https://retro-mage-demo.pixeldrip.games" >> "$GITHUB_STEP_SUMMARY"
